name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 11.0.7

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build project
              run: pnpm build

            - name: Create Release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: Release ${{ github.ref }}
                  body: |
                      ## Changes
                      - 自动构建和部署到 GitHub Pages
                      - 支持文件收集和管理功能

                      ## 安装和使用
                      1. 访问 https://[username].github.io/coolector/
                      2. 上传文件和收集名单
                      3. 管理收集进度

                      ## 技术特性
                      - Vue.js 3.5 + TypeScript 5.7
                      - Vite 8.0 构建工具
                      - Pinia 状态管理
                      - Tailwind CSS 样式框架
                  draft: false
                  prerelease: false
